# Example configuration file for pipewatch notifications
# This shows how to configure multiple notification backends

notifications:
  # Simple stdout notifier for development/testing
  - type: stdout
    enabled: true
    min_level: warning

  # Webhook notifier for production alerts
  - type: webhook
    enabled: true
    min_level: critical
    config:
      url: https://hooks.example.com/pipewatch
      timeout: 30

